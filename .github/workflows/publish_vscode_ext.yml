name: Publish to Open VSX Registry and Visual Studio Marketplace

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      reqstool_version:
        description: 'reqstool version to pin in extension (empty = latest)'
        required: false
        default: ''
        type: string

jobs:
  check-release:
    name: Reuse check release
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/check_release.yml

  build:
    name: Reuse build
    uses: ./.github/workflows/build.yml
    with:
      reqstool_version: ${{ inputs.reqstool_version || '' }}

  dry-run:
    # Validates packaging and PAT token without uploading.
    # Runs on push to main and workflow_dispatch only — not on tag releases.
    # Skips the publish step when VS_MARKETPLACE_TOKEN is not yet configured.
    name: Dry-run publish (skipped if token absent)
    if: (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')) || github.event_name == 'workflow_dispatch'
    env:
      VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Pin reqstool version
        if: ${{ inputs.reqstool_version != '' }}
        run: npm pkg set reqstoolVersion="${{ inputs.reqstool_version }}"
      - name: Log effective reqstool version
        run: |
          VERSION=$(node -p "require('./package.json').reqstoolVersion || '(latest)'")
          echo "reqstoolVersion: $VERSION"
      # - name: Dry-run publish to Open VSX Registry
      #   uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
      #   with:
      #     pat: ${{ secrets.OPEN_VSX_TOKEN }}
      #     dryRun: true
      - name: Dry-run publish to Visual Studio Marketplace
        if: env.VS_MARKETPLACE_TOKEN != ''
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          dryRun: true

  publish-vscode-extension:
    name: Publish extension
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
      - check-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - name: Pin reqstool version
        if: ${{ inputs.reqstool_version != '' }}
        run: npm pkg set reqstoolVersion="${{ inputs.reqstool_version }}"
      - name: Log effective reqstool version
        run: |
          VERSION=$(node -p "require('./package.json').reqstoolVersion || '(latest)'")
          echo "reqstoolVersion: $VERSION"
      - name: Verify version from git tag
        run: |
          VERSION=$(node scripts/get-version.mjs)
          if [ "$VERSION" = "0.0.0-dev" ]; then
            echo "ERROR: could not derive version from git tag — ensure the tag exists and fetch-tags is enabled"
            exit 1
          fi
          echo "Publishing version: $VERSION"
      - name: Build versioned VSIX
        run: npm run build
      - name: Get VSIX path
        id: vsix
        run: echo "path=$(ls *.vsix | head -1)" >> $GITHUB_OUTPUT
      # - name: Publish to Open VSX Registry
      #   uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
      #   with:
      #     pat: ${{ secrets.OPEN_VSX_TOKEN }}
      #     extensionFile: ${{ steps.vsix.outputs.path }}
      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.path }}

  generate-release-notes:
    name: Generate release notes
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - publish-vscode-extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Generate release notes with git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: NOTES.md
      - name: Create or update GitHub Release
        run: |
          if gh release view "${{ github.ref_name }}" > /dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" --notes-file NOTES.md
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file NOTES.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
