name: Publish VS Code Extension

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reqstool_version:
        description: "reqstool version to pin in extension (empty = latest)"
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  check-release:
    if: github.event_name == 'release'
    uses: reqstool/.github/.github/workflows/common-check-release.yml@main
    with:
      version-format: semver

  build:
    uses: ./.github/workflows/build.yml
    with:
      reqstool_version: ${{ inputs.reqstool_version || '' }}

  dry-run:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build]
    uses: reqstool/.github/.github/workflows/typescript-publish-to-vscode.yml@main
    with:
      dry-run: true
      dependency-name: reqstoolVersion
      dependency-version: ${{ inputs.reqstool_version || '' }}
    secrets: inherit
    permissions:
      contents: write

  publish:
    if: github.event_name == 'release'
    needs: [check-release, build]
    uses: reqstool/.github/.github/workflows/typescript-publish-to-vscode.yml@main
    with:
      dry-run: false
      dependency-name: reqstoolVersion
      dependency-version: ${{ inputs.reqstool_version || '' }}
    secrets: inherit
    permissions:
      contents: write
