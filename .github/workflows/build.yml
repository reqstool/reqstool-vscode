name: Build VS Code extension

permissions: {}

on:
  workflow_call:
    inputs:
      reqstool_version:
        description: "reqstool version to install (empty = latest)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      reqstool_version:
        description: "reqstool version to install (empty = latest)"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  lint:
    uses: reqstool/.github/.github/workflows/typescript/lint.yml@main

  build:
    needs: lint
    uses: reqstool/.github/.github/workflows/typescript/build.yml@main
    with:
      use-xvfb: true
      dependency-version: ${{ inputs.reqstool_version || 'latest' }}
      dependency-install-command: ${{ inputs.reqstool_version != '' && 'pipx install reqstool=={version}' || 'pipx install reqstool' }}
