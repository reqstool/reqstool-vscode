name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (npm semver, no v prefix, e.g. 1.2.3 or 1.2.3-rc.1)"
        required: true
        type: string

jobs:
  release:
    uses: reqstool/.github/.github/workflows/common/release.yml@main
    with:
      version: ${{ inputs.version }}
      version-format: semver
    permissions:
      contents: write
    secrets: inherit
