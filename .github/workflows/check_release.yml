name: Check Release
on:
  workflow_call:

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Validate release tag
        run: |
          if [[ "${{ github.ref }}" != refs/tags/* ]]; then
            echo "Not a tag release (ref: ${{ github.ref }})"
            exit 1
          fi
          TAG="${{ github.ref_name }}"
          if ! npx --yes semver "$TAG" > /dev/null; then
            echo "Tag '$TAG' is not a valid npm semver version (expected X.Y.Z or X.Y.Z-pre.1)"
            exit 1
          fi
